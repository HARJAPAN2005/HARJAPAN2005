name: Generate Snake Contribution SVG
on:
  # Schedule updates (At minute 0 past every 12th hour)
  schedule: [{ cron: "0 */12 * * *" }]    
  # Lines below let you run workflow manually with each commit
  workflow_dispatch:
  # run on every push on the master/main branch
  push: { branches: ["master", "main"] } 

# THIS BLOCK IS REQUIRED TO AVOID 403 PERMISSION DENIED ERROR
permissions: 
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph
      - name: generate github contribution snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=orange
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # push the content of <build_dir> to a branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
